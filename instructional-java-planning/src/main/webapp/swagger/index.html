<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPS API Explorer</title>
    <link rel="stylesheet" href="../swagger-ui/META-INF/resources/webjars/swagger-ui-dist/5.17.14/swagger-ui.css">
    <style>
        body {
            margin: 0;
            background: linear-gradient(135deg, #fffafc 0%, #fff1f4 50%, #fff8f0 100%);
        }
        #swagger-ui {
            min-height: 100vh;
        }
    </style>
</head>
<body>
    <div id="swagger-ui"></div>
    <script src="../swagger-ui/META-INF/resources/webjars/swagger-ui-dist/5.17.14/swagger-ui-bundle.js"></script>
    <script src="../swagger-ui/META-INF/resources/webjars/swagger-ui-dist/5.17.14/swagger-ui-standalone-preset.js"></script>
    <script>
        window.onload = function () {
            window.ui = SwaggerUIBundle({
                url: '../openapi',
                dom_id: '#swagger-ui',
                deepLinking: true,
                presets: [
                    SwaggerUIBundle.presets.apis,
                    SwaggerUIStandalonePreset
                ],
                layout: 'StandaloneLayout'
            });
        };
    </script>
</body>
</html>
