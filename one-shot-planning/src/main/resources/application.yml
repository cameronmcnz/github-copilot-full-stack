spring:
  application:
    name: rps-enterprise
  datasource:
    url: jdbc:h2:file:./data/rps-enterprise;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
  thymeleaf:
    cache: false

server:
  error:
    include-message: never

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  endpoints:
    web:
      exposure:
        include: health

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  cookie:
    name: rps-user-id
    max-age-days: 365
