spring:
  datasource:
    url: jdbc:h2:mem:rps-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  thymeleaf:
    cache: false

management:
  endpoint:
    health:
      probes:
        enabled: true